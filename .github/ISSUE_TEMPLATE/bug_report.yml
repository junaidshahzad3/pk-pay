name: 🐛 Bug Report
description: Report a bug to help us improve.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below to help us reproduce and fix it.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      description: Which payment provider is this related to?
      options:
        - JazzCash
        - EasyPaisa
        - Stripe
        - Custom Provider
        - Core SDK (General)
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: What version of Node.js are you using? (output of `node -v`)
      placeholder: v20.x
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Tell us how to reproduce the error (code snippets are great!).
      placeholder: |
        1. Initialize SDK with...
        2. Call createPayment with...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Error Output
      description: Please provide any error messages or logs (redact sensitive info!).
      render: shell
